apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: redis
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: user-redis
          image: redis:7
          args:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
          envFrom:
            - secretRef:
                name: user-service-secret
          ports:
            - containerPort: 6379
          resources:
            limits:
              memory: 256Mi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a $(REDIS_PASSWORD) ping
            initialDelaySeconds: 30
            failureThreshold: 5
            periodSeconds: 10
            timeoutSeconds: 5
      restartPolicy: Always