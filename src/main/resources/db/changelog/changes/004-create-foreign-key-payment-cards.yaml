databaseChangeLog:
  - changeSet:
      id: 004-create-fpreign-key-for-payment-cards
      author: vittorio-niko
      changes:
        - addForeignKeyConstraint:
            baseTableName: payment_cards
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_payment_cards_user_id
            deferrable: false
            initiallyDeferred: false
            onDelete: CASCADE
            onUpdate: CASCADE